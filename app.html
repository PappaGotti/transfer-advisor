<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Transfer Advisor</title>
<style>
  :root {
    --purple:#4B0082; --purple-dark:#350060; --purple-light:#6a00b8;
    --magenta:#E20074; --off-white:#f5f0fa;
    --text-dark:#1a0030; --text-mid:#4a3060; --text-light:#8a6aaa;
    --border:rgba(75,0,130,0.12); --shadow:0 2px 12px rgba(75,0,130,0.10);
    --green:#1a7a4a; --green-bg:rgba(26,122,74,0.08);
    --amber:#b45309; --amber-bg:rgba(180,83,9,0.08);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif; background:var(--off-white); min-height:100vh; padding-bottom:90px; }
  .app-header { background:var(--purple); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; box-shadow:0 2px 12px rgba(0,0,0,0.2); }
  .logo-pair { display:flex; align-items:center; gap:12px; }
  .logo-divider { width:1px; height:28px; background:rgba(255,255,255,0.35); }
  .sign-out-btn { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.25); border-radius:20px; padding:7px 16px; color:white; font-size:13px; font-weight:600; cursor:pointer; min-height:36px; white-space:nowrap; }
  .loc-bar { background:var(--purple-dark); padding:10px 16px; display:flex; align-items:center; gap:8px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .loc-bar p { font-size:13px; color:rgba(255,255,255,0.8); }
  .loc-bar strong { color:white; font-weight:700; }
  .app-body { padding:18px 16px 0; }
  .greeting { margin-bottom:20px; }
  .greeting h1 { font-size:21px; font-weight:700; color:var(--text-dark); margin-bottom:3px; }
  .greeting p { font-size:13px; color:var(--text-light); }
  .section-label { font-size:10px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-light); margin-bottom:10px; padding-left:2px; }
  .stat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:22px; }
  .stat-card { background:white; border-radius:14px; padding:14px 10px; box-shadow:var(--shadow); text-align:center; }
  .stat-value { font-size:22px; font-weight:800; color:var(--purple); line-height:1; margin-bottom:5px; }
  .stat-value.amber { color:var(--amber); }
  .stat-value.green { color:var(--green); }
  .stat-label { font-size:9px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:0.5px; line-height:1.3; }
  .store-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .store-card { background:white; border-radius:14px; overflow:hidden; box-shadow:var(--shadow); cursor:pointer; border:1.5px solid transparent; transition:transform 0.12s; -webkit-tap-highlight-color:transparent; }
  .store-card:active { transform:scale(0.985); }
  .store-card-top { padding:14px 16px 10px; display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
  .store-name { font-size:15px; font-weight:700; color:var(--text-dark); margin-bottom:2px; }
  .store-id { font-size:11px; color:var(--text-light); }
  .store-stats { padding:0 16px 12px; display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .sstat { text-align:center; }
  .sstat .sv { font-size:17px; font-weight:800; color:var(--text-dark); line-height:1; }
  .sstat .sv.hot { color:var(--magenta); }
  .sstat .sv.warn { color:var(--amber); }
  .sstat .sl { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-light); margin-top:3px; }
  .store-card-foot { border-top:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; }
  .transfer-hint { font-size:12px; font-weight:600; }
  .transfer-hint.has { color:var(--magenta); }
  .transfer-hint.none { color:var(--text-light); }
  .chev { color:var(--text-light); font-size:16px; }
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:200; }
  .overlay.open { display:block; }
  .panel { position:fixed; left:0; right:0; bottom:0; background:var(--off-white); border-radius:20px 20px 0 0; max-height:85vh; display:flex; flex-direction:column; transform:translateY(100%); transition:transform 0.28s cubic-bezier(0.32,0.72,0,1); z-index:201; }
  .panel.open { transform:translateY(0); }
  .panel-handle { width:36px; height:4px; background:rgba(0,0,0,0.15); border-radius:2px; margin:12px auto 0; flex-shrink:0; }
  .panel-hdr { padding:14px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .panel-hdr h2 { font-size:17px; font-weight:700; color:var(--text-dark); }
  .panel-hdr p { font-size:12px; color:var(--text-light); margin-top:2px; }
  .panel-body { flex:1; overflow-y:auto; padding:14px 16px 30px; -webkit-overflow-scrolling:touch; }
  .t-item { background:white; border-radius:12px; padding:14px; margin-bottom:10px; box-shadow:var(--shadow); }
  .t-item-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:10px; }
  .t-name { font-size:14px; font-weight:700; color:var(--text-dark); line-height:1.3; }
  .t-cat { font-size:11px; color:var(--text-light); margin-top:2px; }
  .cov-badge { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; padding:3px 9px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
  .cov-badge.full { background:var(--green-bg); color:var(--green); }
  .cov-badge.partial { background:var(--amber-bg); color:var(--amber); }
  .cov-badge.po { background:rgba(190,18,60,0.08); color:#be123c; }
  .t-arrow { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .t-store { background:var(--off-white); border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:12px; font-weight:600; color:var(--text-dark); flex:1; text-align:center; }
  .t-arrowicon { color:var(--magenta); font-size:18px; flex-shrink:0; }
  .t-meta { display:flex; gap:8px; flex-wrap:wrap; }
  .t-pill { font-size:11px; font-weight:600; background:var(--off-white); border-radius:8px; padding:4px 9px; color:var(--text-mid); }
  .t-pill.val { color:var(--purple); font-weight:700; }
  .t-pill.warn { color:var(--amber); }
  .spinner-wrap { text-align:center; padding:40px 20px; }
  .spinner { width:28px; height:28px; border:3px solid rgba(75,0,130,0.15); border-top-color:var(--purple); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .err-box { padding:16px; border-radius:12px; margin:10px 0; }
  .err-box.red { background:#f8d7da; color:#be123c; }
  .err-box.yellow { background:#fff3cd; color:#856404; }
  .err-box p { font-size:13px; margin-top:4px; }
  .err-box strong { font-weight:700; }
  .bnav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom,6px); box-shadow:0 -2px 12px rgba(75,0,130,0.08); }
  .bnav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 4px 6px; gap:3px; cursor:pointer; color:var(--text-light); font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; -webkit-tap-highlight-color:transparent; }
  .bnav-item.active { color:var(--purple); }
  .bnav-icon { font-size:22px; line-height:1; }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo-pair">
    <svg viewBox="0 0 180 70" xmlns="http://www.w3.org/2000/svg" height="30">
  <text x="4" y="52" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="54" fill="white">ctw</text>
  <circle cx="148" cy="18" r="5" fill="white"/>
  <path d="M155 10 Q168 4 174 18" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M159 5 Q176 -4 182 18" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
    <div class="logo-divider"></div>
    <svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" height="28">
  <text x="4" y="44" font-family="Arial,sans-serif" font-weight="900" font-size="42" fill="white">metro</text>
  <text x="12" y="60" font-family="Arial,sans-serif" font-weight="700" font-size="16" fill="#E20074">by T-Mobile</text>
</svg>
  </div>
  <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
</header>

<div class="loc-bar"><span>&#128205;</span><p id="loc-text">Loading...</p></div>

<div class="app-body">
  <div class="greeting">
    <h1 id="greet">Good morning</h1>
    <p id="greet-sub">Here's your district at a glance</p>
  </div>
  <div class="section-label">District Summary</div>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-value" id="s-stores">&#8212;</div><div class="stat-label">Stores</div></div>
    <div class="stat-card"><div class="stat-value amber" id="s-trans">&#8212;</div><div class="stat-label">Transfers Pending</div></div>
    <div class="stat-card"><div class="stat-value green" id="s-val">&#8212;</div><div class="stat-label">Transfer Value</div></div>
  </div>
  <div class="section-label">My Stores</div>
  <div class="store-list" id="store-list">
    <div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--text-light);font-size:14px;">Loading...</p></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-hdr"><h2 id="p-name">Transfers</h2><p id="p-sub">Transfer suggestions</p></div>
  <div class="panel-body" id="p-body"></div>
</div>

<nav class="bnav">
  <div class="bnav-item active"><span class="bnav-icon">&#127968;</span>Home</div>
  <div class="bnav-item"><span class="bnav-icon">&#128260;</span>Transfers</div>
  <div class="bnav-item"><span class="bnav-icon">&#128202;</span>Market</div>
  <div class="bnav-item"><span class="bnav-icon">&#128100;</span>Profile</div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = supabase.createClient("https://nmwlxfwqeduhpygbsnip.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5td2x4ZndxZWR1aHB5Z2JzbmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODg4MjIsImV4cCI6MjA5NzM2NDgyMn0.xidH5wySoptVL4AOWE6lkrBPVDpPY7t2mE3A1CZdv5k");
const SHEET_ID = "1ScasNvCPGeo-dIka8f9UUZ4AFOP48A3G3qTyXbTC_Ow";

const EMAIL_MAP = {
  "rj@ct-wireless.com":        "RJ",
  "moe@ct-wireless.com":       "MOE",
  "leydi@ct-wireless.com":     "LEYDI LAURA",
  "adil@ct-wireless.com":      "ADIL",
  "jessica@ct-wireless.com":   "JESSICA",
  "sgamez@ct-wireless.com":    "SUSANA G",
  "hussam@ct-wireless.com":    "HUSAM",
  "augusto@ct-wireless.com":   "AUGUSTO",
  "lissandra@ct-wireless.com": "LISSANDRA",
  "daily@ct-wireless.com":     "DAILY",
  "anele@ct-wireless.com":     "ANELE"
};

const USER_MARKETS = {
  "RJ":          ["TAMPA BAY","PORT CHARLOTTE"],
  "MOE":         ["MIAMI"],
  "LEYDI LAURA": ["MIAMI"],
  "ADIL":        ["TAMPA BAY"],
  "JESSICA":     ["TAMPA BAY"],
  "SUSANA G":    ["TAMPA BAY"],
  "HUSAM":       ["TAMPA BAY"],
  "AUGUSTO":     ["PORT CHARLOTTE"],
  "LISSANDRA":   ["MIAMI"],
  "DAILY":       ["MIAMI"],
  "ANELE":       ["MIAMI"]
};

const DM_NAMES = ["ADIL","JESSICA","SUSANA G","HUSAM","AUGUSTO","LISSANDRA","DAILY","ANELE"];

var allTransfers = [];
var currentUser = "";

async function fetchSheet(tab) {
  var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID
    + "/gviz/tq?tqx=out:json&sheet=" + encodeURIComponent(tab);
  var resp = await fetch(url);
  if (!resp.ok) throw new Error("HTTP " + resp.status + " fetching sheet");
  var text = await resp.text();
  var start = text.indexOf("{");
  var end = text.lastIndexOf("}");
  if (start < 0) throw new Error("Invalid response from Google Sheets");
  var json = JSON.parse(text.substring(start, end + 1));
  if (!json.table || !json.table.cols) throw new Error("Sheet not found or not shared publicly");
  var cols = json.table.cols.map(function(c){ return c.label || ""; });
  var rows = json.table.rows || [];
  return rows.map(function(r){
    var obj = {};
    (r.c || []).forEach(function(cell,i){
      obj[cols[i]] = (cell && cell.v !== null && cell.v !== undefined) ? cell.v : "";
    });
    return obj;
  });
}

function buildStoreMap(transfers, userName) {
  var markets = USER_MARKETS[userName] || [];
  var isDM = DM_NAMES.indexOf(userName) > -1;
  var map = {};
  transfers.forEach(function(t){
    var dm     = String(t["DM"]     || "").trim().toUpperCase();
    var market = String(t["Market"] || "").trim().toUpperCase();
    if (!markets.some(function(m){ return market === m; })) return;
    if (isDM && dm !== userName.toUpperCase()) return;
    var fromID   = String(t["FROM Store ID"]   || "").trim();
    var fromName = String(t["FROM Store Name"] || "").trim();
    var toID     = String(t["TO Store ID"]     || "").trim();
    var toName   = String(t["TO Store Name"]   || "").trim();
    var qty      = Number(t["Transfer Qty"])   || 0;
    var value    = Number(t["Transfer Value"]) || 0;
    var isPO     = String(t["Coverage Status"] || "").indexOf("Purchase") > -1;
    if (fromID && fromID !== "N/A") {
      if (!map[fromID]) map[fromID] = {id:fromID,name:fromName,market:market,transfers:0,value:0,po:0};
      if (!isPO){ map[fromID].transfers++; map[fromID].value += value; }
    }
    if (toID && toID !== "N/A") {
      if (!map[toID]) map[toID] = {id:toID,name:toName,market:market,transfers:0,value:0,po:0};
      if (isPO) map[toID].po++;
      else { map[toID].transfers++; map[toID].value += value; }
    }
  });
  return Object.values(map).sort(function(a,b){
    return a.market !== b.market ? (a.market < b.market ? -1:1) : (a.name < b.name ? -1:1);
  });
}

function renderStores(stores) {
  var totalT=0, totalV=0;
  if (!stores.length) {
    document.getElementById("store-list").innerHTML =
      '<div class="err-box yellow"><strong>No data found</strong><p>No transfers matched your account. Check that the Transfer Data sheet has data and your DM name matches exactly.</p></div>';
    document.getElementById("s-stores").textContent="0";
    document.getElementById("s-trans").textContent="0";
    document.getElementById("s-val").textContent="$0";
    return;
  }
  document.getElementById("store-list").innerHTML = stores.map(function(s){
    totalT+=s.transfers; totalV+=s.value;
    var hasT=s.transfers>0;
    return '<div class="store-card" onclick="openPanel(\''+ s.id +'\',\''+ s.name +'\')">'+
      '<div class="store-card-top"><div>'+
      '<div class="store-name">'+s.name+'</div>'+
      '<div class="store-id">'+s.id+' &middot; '+s.market+'</div></div></div>'+
      '<div class="store-stats">'+
      '<div class="sstat"><div class="sv'+(hasT?' hot':'')+'">'+s.transfers+'</div><div class="sl">Transfers</div></div>'+
      '<div class="sstat"><div class="sv'+(hasT?' hot':'')+'">$'+Math.round(s.value).toLocaleString()+'</div><div class="sl">Value</div></div>'+
      '<div class="sstat"><div class="sv'+(s.po>0?' warn':'')+'">'+s.po+'</div><div class="sl">PO Needed</div></div>'+
      '</div>'+
      '<div class="store-card-foot">'+
      '<span class="transfer-hint '+(hasT?'has':'none')+'">'+
      (hasT?'&#128260; '+s.transfers+' transfer'+(s.transfers!==1?'s':'')+' to action':'&#10003; No transfers needed')+
      '</span><span class="chev">&#8250;</span></div></div>';
  }).join('');
  document.getElementById("s-stores").textContent = stores.length;
  document.getElementById("s-trans").textContent = totalT;
  document.getElementById("s-val").textContent = "$"+Math.round(totalV).toLocaleString();
}

function openPanel(storeId, storeName) {
  document.getElementById("p-name").textContent = storeName;
  document.getElementById("p-sub").textContent = storeId + " — Transfers";
  var markets = USER_MARKETS[currentUser] || [];
  var isDM = DM_NAMES.indexOf(currentUser) > -1;
  var rows = allTransfers.filter(function(t){
    var market = String(t["Market"]||"").trim().toUpperCase();
    var dm = String(t["DM"]||"").trim().toUpperCase();
    if (!markets.some(function(m){ return market===m; })) return false;
    if (isDM && dm !== currentUser.toUpperCase()) return false;
    return String(t["FROM Store ID"]||"").trim()===storeId || String(t["TO Store ID"]||"").trim()===storeId;
  });
  var body = document.getElementById("p-body");
  if (!rows.length) {
    body.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--text-light);"><p style="font-size:32px;">&#10003;</p><p style="margin-top:8px;">No transfers for this store.</p></div>';
  } else {
    body.innerHTML = rows.map(function(t){
      var cov = String(t["Coverage Status"]||"");
      var isPO = cov.indexOf("Purchase")>-1;
      var isPartial = cov.indexOf("Partial")>-1;
      var bClass = isPO?"po":isPartial?"partial":"full";
      var bLabel = isPO?"PO Needed":isPartial?"Partial":"Covered";
      var fromName = String(t["FROM Store Name"]||t["FROM Store ID"]||"N/A");
      var toName   = String(t["TO Store Name"]  ||t["TO Store ID"]  ||"");
      var qty   = Number(t["Transfer Qty"])  ||0;
      var value = Number(t["Transfer Value"])||0;
      return '<div class="t-item">'+
        '<div class="t-item-top"><div>'+
        '<div class="t-name">'+String(t["Item Description"]||"")+'</div>'+
        '<div class="t-cat">'+String(t["Sub Category"]||t["Item Category"]||"")+'</div></div>'+
        '<span class="cov-badge '+bClass+'">'+bLabel+'</span></div>'+
        (isPO?'':('<div class="t-arrow"><div class="t-store">'+fromName+'</div><span class="t-arrowicon">&#8594;</span><div class="t-store">'+toName+'</div></div>'))+
        '<div class="t-meta">'+
        '<span class="t-pill">Qty: '+qty+'</span>'+
        '<span class="t-pill val">$'+value.toFixed(2)+'</span>'+
        (isPO?'<span class="t-pill warn">Suggest PO</span>':'')+
        '</div></div>';
    }).join('');
  }
  document.getElementById("overlay").classList.add("open");
  document.getElementById("panel").classList.add("open");
}

function closePanel() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("panel").classList.remove("open");
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = "login.html";
}

function loadApp(session) {
  var email = session.user.email;
  var name = EMAIL_MAP[email];
  if (!name) {
    document.getElementById("store-list").innerHTML=
      '<div class="err-box yellow"><strong>Email not matched</strong><p>Logged in as: '+email+'</p></div>';
    return;
  }
  currentUser = name;
  var h = new Date().getHours();
  document.getElementById("greet").textContent =
    (h<12?"Good morning":h<17?"Good afternoon":"Good evening")+", "+name.split(" ")[0]+"!";
  document.getElementById("loc-text").innerHTML = "Signed in as <strong>"+name+"</strong>";

  fetchSheet("Transfer Data").then(function(data){
    allTransfers = data;
    var stores = buildStoreMap(data, name);
    renderStores(stores);
  }).catch(function(err){
    document.getElementById("store-list").innerHTML=
      '<div class="err-box red"><strong>Could not load data</strong><p>'+err.message+'</p><p style="margin-top:6px;">Make sure the sheet is shared as Anyone with link can view.</p></div>';
    document.getElementById("s-stores").textContent="!";
    document.getElementById("s-trans").textContent="!";
    document.getElementById("s-val").textContent="!";
  });
}

sb.auth.onAuthStateChange(function(event, session){
  if (event==="SIGNED_IN"||event==="INITIAL_SESSION"){
    if (session) loadApp(session);
    else window.location.href="login.html";
  }
});
</script>
</body>
</html>
